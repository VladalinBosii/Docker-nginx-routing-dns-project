<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="/css/style.css" rel="stylesheet">
  <!-- Bootstrap Bundle JS  -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JavaScript -->
  <script src="/js/script.js"></script>
</head>
<body>
<div class="main-container">
  <div class="logo mb-1">
    <i class="fas fa-user-graduate me-1"></i> Students Dashboard
  </div>
  <div id="alertContainer"></div>
  <ul id="studentList" class="list-unstyled"></ul>

  <form id="studentForm" autocomplete="off">
    <div class="mb-2">
      <label for="name" class="form-label">Name</label>
      <input id="name" class="form-control" placeholder="Full Name" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input id="email" class="form-control" type="email" placeholder="Email Address" required>
    </div>
    <button class="btn btn-primary w-100 py-2" type="submit">
      <i class="fas fa-plus"></i> Add Student
    </button>
  </form>
</div>
</body>
</html>
