version: "3.9"
services:
  vb_db:
    image: postgres:17.2-alpine
    container_name: vb_db
    restart: always
    environment:
      POSTGRES_DB: infra3project_vladalinbosii_acs202
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "5054:5432"
    volumes:
      - vb_db_data:/var/lib/postgresql/data
    networks:
      - vb_net

  vb_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vb_app
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    networks:
      - vb_net

  vb_proxy:
    image: nginx:latest
    container_name: vb_proxy
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./src/main/resources/static/js:/usr/share/nginx/html/js:ro
      - ./src/main/resources/static/templates:/usr/share/nginx/html/templates:ro
      - ./src/main/resources/static/css:/usr/share/nginx/html/css:ro
    depends_on:
      - vb_app
      - vb_db
    networks:
      - vb_net

volumes:
  vb_db_data:

networks:
  vb_net:
    name: vb_net
